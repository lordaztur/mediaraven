site_name: MediaRaven
site_description: Bot do Telegram que baixa qualquer mídia da internet — documentação completa
site_url: https://lordaztur.github.io/mediaraven/
repo_url: https://github.com/LordAztur/mediaraven
repo_name: LordAztur/mediaraven
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2026 Lord Aztur

theme:
  name: material
  language: pt
  logo: assets/logo.svg
  favicon: assets/logo.svg
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme)"
      toggle: { icon: material/brightness-auto, name: Sistema }
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle: { icon: material/brightness-7, name: Modo escuro }
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle: { icon: material/brightness-4, name: Modo claro }
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - toc.follow

plugins:
  - search:
      lang: [pt, en]
  - i18n:
      docs_structure: folder
      languages:
        - locale: pt
          default: true
          name: Português
          build: true
        - locale: en
          name: English
          build: true
          nav_translations:
            Início: Home
            Começando: Getting Started
            Instalação: Installation
            Configuração: Configuration
            Plataformas: Platforms
            Reddit: Reddit
            Threads: Threads
            Facebook: Facebook
            Scraper Genérico: Generic Scraper
            Customização: Customization
            Visão geral: Overview
            Chaves de configuração: Config Keys
            Mensagens da interface: UI Messages
            Mensagens de log: Log Messages
            Como funciona: How it works
            Cascata do scraper: Scraper Cascade
            Bypass de paywall: Paywall Bypass
            Extração de artigo: Article Extraction
            Posts de texto: Text-only Posts
            Referência: Reference
            Helpers internos: Internal Helpers
            Logging: Logging
            Solução de problemas: Troubleshooting
            Changelog: Changelog
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
      fallback_to_build_date: true
  - mermaid2

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.caret

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/LordAztur/mediaraven
    - icon: fontawesome/brands/telegram
      link: https://t.me/

nav:
  - Início: index.md
  - Começando:
      - getting-started/index.md
      - Instalação: getting-started/install.md
      - Configuração: getting-started/config.md
  - Plataformas:
      - platforms/index.md
      - YouTube: platforms/youtube.md
      - Instagram: platforms/instagram.md
      - Reddit: platforms/reddit.md
      - Threads: platforms/threads.md
      - X: platforms/x.md
      - Facebook: platforms/facebook.md
      - Scraper Genérico: platforms/scraper.md
  - Customização:
      - customization/index.md
      - Chaves de configuração: customization/keys.md
      - Mensagens da interface: customization/messages.md
      - Mensagens de log: customization/logs.md
  - Como funciona:
      - architecture/index.md
      - Cascata do scraper: architecture/scraper-cascade.md
      - Bypass de paywall: architecture/paywall-bypass.md
      - Extração de artigo: architecture/article-extraction.md
      - Posts de texto: architecture/text-only-posts.md
  - Referência:
      - reference/index.md
      - Helpers internos: reference/helpers.md
      - Logging: reference/logging.md
  - Solução de problemas: troubleshooting.md
  - Changelog: changelog.md
